<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SismoAlert - Dashboard Administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 15px; border: none; }
        .badge { padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; }
        .stats-card { transition: transform 0.2s; }
        .stats-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <span class="navbar-brand fw-bold text-danger">🚨 SismoAlert Admin</span>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">Cerrar Sesión</button>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm p-3 mb-3">
                <h5 class="fw-bold mb-3">Nueva Alerta</h5>
                <input type="text" id="alertTitle" class="form-control mb-2" placeholder="Ej: Sismo 5.2 - Zona 10">
                <button class="btn btn-danger w-100 fw-bold" id="btnLaunch">NOTIFICAR POR CORREO</button>
            </div>
            <div class="card shadow-sm p-3">
                <button class="btn btn-outline-secondary btn-sm w-100" id="btnClearAll">Limpiar Tabla de Reportes</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="row g-3 text-center">
                <div class="col-4">
                    <div class="stats-card p-3 bg-success text-white rounded-4 shadow-sm">
                        <h2 id="countBien" class="fw-bold m-0">0</h2>
                        <small class="fw-bold">A SALVO</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="stats-card p-3 bg-warning text-dark rounded-4 shadow-sm">
                        <h2 id="countMal" class="fw-bold m-0">0</h2>
                        <small class="fw-bold">ESTOY MAL</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="stats-card p-3 bg-danger text-white rounded-4 shadow-sm">
                        <h2 id="countAyuda" class="fw-bold m-0">0</h2>
                        <small class="fw-bold">AYUDA</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm overflow-hidden">
        <div class="card-header bg-white fw-bold py-3 border-bottom">Reportes en Tiempo Real</div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nombre del Empleado</th>
                        <th>Estado</th>
                        <th>Fecha y Hora</th>
                        <th class="text-end">Acción</th>
                    </tr>
                </thead>
                <tbody id="reportsTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="dashboard.js"></script>
</body>
</html>
