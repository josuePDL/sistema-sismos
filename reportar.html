<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SismoAlert - Reportar Estado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="reportar.css">
</head>
<body>

    <div class="card report-card shadow-lg p-4 text-center">
        <div class="mb-4">
            <h2 class="fw-bold text-danger">SismoAlert</h2>
            <p class="text-muted">Centro de Reportes de Emergencia</p>
        </div>

        <div class="mb-4 text-start">
            <label for="nombreEmpleado" class="form-label fw-bold small text-secondary">NOMBRE COMPLETO (Obligatorio):</label>
            <input type="text" id="nombreEmpleado" class="form-control form-control-lg" placeholder="Ej: Pedro" required>
        </div>

        <h5 class="mb-3">¿Cuál es tu estado actual?</h5>
        
        <div class="d-grid gap-3">
            <button onclick="enviarEstado('bien')" class="btn btn-success btn-lg py-3 fw-bold">ESTOY BIEN</button>
            <button onclick="enviarEstado('mal')" class="btn btn-warning btn-lg py-3 fw-bold text-dark">ESTOY MAL</button>
            <button onclick="enviarEstado('ayuda')" class="btn btn-danger btn-lg py-3 fw-bold">NECESITO AYUDA</button>
        </div>

        <div id="statusMsg" class="mt-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="reportar.js"></script>
</body>
</html>
