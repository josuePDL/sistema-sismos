<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SismoAlert - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card login-card p-4">
        <div class="card-body text-center">
            <h2 class="mb-4 fw-bold text-dark">SismoAlert GT</h2>
            <p class="text-muted mb-4">Panel Administrativo</p>
            
            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label for="email" class="form-label text-secondary small fw-bold">CORREO ELECTRÓNICO</label>
                    <input type="email" class="form-control" id="email" placeholder="admin@empresa.com" required>
                </div>
                <div class="mb-4 text-start">
                    <label for="password" class="form-label text-secondary small fw-bold">CONTRASEÑA</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
                    Entrar al Dashboard
                </button>
            </form>

            <div id="alertPlaceholder"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
